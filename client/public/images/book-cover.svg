<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="600" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1611"/>
      <stop offset="55%" stop-color="#171310"/>
      <stop offset="100%" stop-color="#12100d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#d1a54a" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#d1a54a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cellGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6c374"/>
      <stop offset="100%" stop-color="#b9863a"/>
    </linearGradient>
  </defs>

  <rect width="600" height="900" fill="url(#bgGrad)"/>
  <rect x="28" y="28" width="544" height="844" fill="none" stroke="#d1a54a" stroke-opacity="0.22" stroke-width="1"/>

  <rect width="600" height="900" fill="url(#glow)"/>

  <text x="300" y="130" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" letter-spacing="5" fill="#c9a876" opacity="0.85">A SYSTEM FOR FINDING</text>
  <text x="300" y="152" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" letter-spacing="5" fill="#c9a876" opacity="0.85">THE GENIUS YOU ALREADY CARRY</text>

  <!-- The Genius Grid, top-right cell glows gold -->
  <g transform="translate(300,395)">
    <g transform="translate(-126,-126)">
      <rect x="0"   y="0"   width="80" height="80" rx="4" fill="#2a231c" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="92"  y="0"   width="80" height="80" rx="4" fill="#2a231c" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="184" y="0"   width="80" height="80" rx="4" fill="url(#cellGold)"/>
      <rect x="0"   y="92"  width="80" height="80" rx="4" fill="#2a231c" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="92"  y="92"  width="80" height="80" rx="4" fill="#2a231c" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="184" y="92"  width="80" height="80" rx="4" fill="#2a231c" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="0"   y="184" width="80" height="80" rx="4" fill="#2a231c" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="92"  y="184" width="80" height="80" rx="4" fill="#2a231c" stroke="#ffffff" stroke-opacity="0.08"/>
      <rect x="184" y="184" width="80" height="80" rx="4" fill="#2a231c" stroke="#ffffff" stroke-opacity="0.08"/>
    </g>
  </g>

  <line x1="150" y1="560" x2="450" y2="560" stroke="#d1a54a" stroke-opacity="0.55" stroke-width="1"/>

  <text x="300" y="625" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="54" fill="#efe6d8" letter-spacing="1">THE GENIUS</text>
  <text x="300" y="685" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="54" fill="#efe6d8" letter-spacing="1">INDEX</text>

  <text x="300" y="770" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="18" fill="#d1a54a">D. Antione Dixon</text>

  <text x="300" y="845" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" letter-spacing="4" fill="#7a7268">E.A.T. MEDIA</text>
</svg>
